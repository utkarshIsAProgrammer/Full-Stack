<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sign Up - Glassmorphism</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			:root {
				--bg-primary: linear-gradient(
					135deg,
					#0f0f1e 0%,
					#1a0f2e 50%,
					#0d0a1f 100%
				);
				--bg-secondary: rgba(147, 197, 253, 0.05);
				--text-primary: #ffffff;
				--text-secondary: rgba(196, 181, 253, 0.7);
				--glass-bg: rgba(147, 197, 253, 0.05);
				--glass-border: rgba(147, 197, 253, 0.1);
				--input-bg: rgba(147, 197, 253, 0.05);
				--input-border: rgba(147, 197, 253, 0.2);
				--button-bg: linear-gradient(135deg, #1e1b4b, #312e81);
				--shadow: rgba(0, 0, 0, 0.3);
			}

			[data-theme="light"] {
				--bg-primary: linear-gradient(
					135deg,
					#93c5fd 0%,
					#c4b5fd 50%,
					#a5b4fc 100%
				);
				--bg-secondary: rgba(255, 255, 255, 0.2);
				--text-primary: #1f2937;
				--text-secondary: rgba(31, 41, 55, 0.7);
				--glass-bg: rgba(255, 255, 255, 0.3);
				--glass-border: rgba(255, 255, 255, 0.5);
				--input-bg: rgba(255, 255, 255, 0.4);
				--input-border: rgba(255, 255, 255, 0.6);
				--button-bg: linear-gradient(135deg, #6366f1, #8b5cf6);
				--shadow: rgba(0, 0, 0, 0.1);
			}

			body {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				background: var(--bg-primary);
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 20px;
				position: relative;
				overflow-x: hidden;
			}

			body::before {
				content: "";
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: var(--bg-primary);
				z-index: -2;
			}

			body::after {
				content: "";
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				background: radial-gradient(
						circle at 20% 50%,
						rgba(255, 255, 255, 0.1) 0%,
						transparent 50%
					),
					radial-gradient(
						circle at 80% 20%,
						rgba(255, 255, 255, 0.1) 0%,
						transparent 50%
					),
					radial-gradient(
						circle at 40% 80%,
						rgba(255, 255, 255, 0.1) 0%,
						transparent 50%
					);
				z-index: -1;
			}

			.theme-toggle {
				position: fixed;
				top: 20px;
				right: 20px;
				z-index: 1000;
				background: var(--glass-bg);
				border: 1px solid var(--glass-border);
				border-radius: 50px;
				padding: 10px;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
				cursor: pointer;
				transition: all 0.3s ease;
				display: flex;
				align-items: center;
				gap: 8px;
			}

			.theme-toggle:hover {
				transform: translateY(-2px);
				box-shadow: 0 8px 25px var(--shadow);
			}

			.theme-icon {
				font-size: 18px;
				transition: transform 0.3s ease;
			}

			.signup-container {
				background: var(--glass-bg);
				backdrop-filter: blur(20px);
				-webkit-backdrop-filter: blur(20px);
				border-radius: 20px;
				border: 1px solid var(--glass-border);
				padding: 40px;
				width: 100%;
				max-width: 420px;
				box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1),
					inset 0 1px 0 rgba(255, 255, 255, 0.2);
				transition: all 0.3s ease;
				animation: slideUp 0.6s ease-out;
			}

			@keyframes slideUp {
				from {
					opacity: 0;
					transform: translateY(30px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.signup-container:hover {
				transform: translateY(-5px);
				box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15),
					inset 0 1px 0 rgba(255, 255, 255, 0.2);
			}

			.header {
				text-align: center;
				margin-bottom: 30px;
			}

			.header h1 {
				color: var(--text-primary);
				font-size: 2.5rem;
				font-weight: 300;
				margin-bottom: 10px;
				letter-spacing: -0.5px;
			}

			.header p {
				color: var(--text-secondary);
				font-size: 1rem;
				font-weight: 300;
			}

			.form-group {
				margin-bottom: 20px;
				position: relative;
			}

			.form-group label {
				display: block;
				color: var(--text-primary);
				font-size: 0.9rem;
				font-weight: 500;
				margin-bottom: 8px;
				transition: color 0.3s ease;
			}

			.form-group input {
				width: 100%;
				padding: 15px 20px;
				background: var(--input-bg);
				border: 1px solid var(--input-border);
				border-radius: 12px;
				color: var(--text-primary);
				font-size: 1rem;
				outline: none;
				transition: all 0.3s ease;
				backdrop-filter: blur(10px);
				-webkit-backdrop-filter: blur(10px);
			}

			.form-group input::placeholder {
				color: var(--text-secondary);
			}

			.form-group input:focus {
				border-color: rgba(255, 255, 255, 0.6);
				transform: translateY(-2px);
				box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
			}

			.form-group input:focus + label {
				color: var(--text-primary);
			}

			.submit-btn {
				width: 100%;
				padding: 16px;
				background: var(--button-bg);
				border: none;
				border-radius: 12px;
				color: white;
				font-size: 1.1rem;
				font-weight: 600;
				cursor: pointer;
				transition: all 0.3s ease;
				margin-top: 10px;
				box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
			}

			.submit-btn:hover {
				transform: translateY(-2px);
				box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
			}

			.submit-btn:active {
				transform: translateY(0);
			}

			.footer-text {
				text-align: center;
				margin-top: 25px;
				color: var(--text-secondary);
				font-size: 0.9rem;
			}

			.footer-text a {
				color: var(--text-primary);
				text-decoration: none;
				font-weight: 500;
				transition: opacity 0.3s ease;
			}

			.footer-text a:hover {
				opacity: 0.8;
			}

			/* Floating particles */
			.particle {
				position: fixed;
				background: rgba(255, 255, 255, 0.1);
				border-radius: 50%;
				pointer-events: none;
				animation: float 6s ease-in-out infinite;
			}

			.particle:nth-child(1) {
				width: 80px;
				height: 80px;
				top: 20%;
				left: 10%;
				animation-delay: 0s;
			}

			.particle:nth-child(2) {
				width: 60px;
				height: 60px;
				top: 60%;
				right: 10%;
				animation-delay: 2s;
			}

			.particle:nth-child(3) {
				width: 40px;
				height: 40px;
				bottom: 20%;
				left: 20%;
				animation-delay: 4s;
			}

			@keyframes float {
				0%,
				100% {
					transform: translateY(0px) rotate(0deg);
				}
				50% {
					transform: translateY(-20px) rotate(180deg);
				}
			}

			/* Responsive Design */
			@media (max-width: 768px) {
				.signup-container {
					padding: 30px 25px;
					margin: 20px;
				}

				.header h1 {
					font-size: 2rem;
				}

				.theme-toggle {
					top: 15px;
					right: 15px;
					padding: 8px;
				}
			}

			@media (max-width: 480px) {
				.signup-container {
					padding: 25px 20px;
				}

				.header h1 {
					font-size: 1.8rem;
				}

				.form-group input {
					padding: 12px 16px;
				}

				.submit-btn {
					padding: 14px;
				}
			}
		</style>
	</head>
	<body data-theme="dark">
		<!-- Floating particles -->
		<div class="particle"></div>
		<div class="particle"></div>
		<div class="particle"></div>

		<!-- Theme toggle -->
		<div class="theme-toggle" onclick="toggleTheme()">
			<span class="theme-icon" id="themeIcon">🌙</span>
		</div>

		<div class="signup-container">
			<div class="header">
				<h1>Sign Up</h1>
				<p>Create your account to get started</p>
			</div>

			<form>
				<div class="form-group">
					<label for="email">Email Address</label>
					<input
						type="email"
						id="email"
						name="email"
						placeholder="Enter your email"
						required />
				</div>

				<div class="form-group">
					<label for="contact">Contact Number</label>
					<input
						type="tel"
						id="contact"
						name="contact"
						placeholder="Enter your contact number"
						required />
				</div>

				<div class="form-group">
					<label for="password">Password</label>
					<input
						type="password"
						id="password"
						name="password"
						placeholder="Create a password"
						required />
				</div>

				<div class="form-group">
					<label for="confirmPassword">Confirm Password</label>
					<input
						type="password"
						id="confirmPassword"
						name="confirmPassword"
						placeholder="Confirm your password"
						required />
				</div>

				<button type="submit" class="submit-btn">Create Account</button>
			</form>

			<div class="footer-text">
				Already have an account? <a href="#">Sign In</a>
			</div>
		</div>

		<script>
			// Theme switching functionality
			function toggleTheme() {
				const body = document.body;
				const themeIcon = document.getElementById("themeIcon");
				const currentTheme = body.getAttribute("data-theme");

				if (currentTheme === "dark") {
					body.setAttribute("data-theme", "light");
					themeIcon.textContent = "☀️";
					themeIcon.style.transform = "rotate(180deg)";
					localStorage.setItem("theme", "light");
				} else {
					body.setAttribute("data-theme", "dark");
					themeIcon.textContent = "🌙";
					themeIcon.style.transform = "rotate(0deg)";
					localStorage.setItem("theme", "dark");
				}
			}

			// Load saved theme on page load
			function loadSavedTheme() {
				const savedTheme = localStorage.getItem("theme") || "dark";
				const body = document.body;
				const themeIcon = document.getElementById("themeIcon");

				body.setAttribute("data-theme", savedTheme);
				if (savedTheme === "light") {
					themeIcon.textContent = "☀️";
					themeIcon.style.transform = "rotate(180deg)";
				} else {
					themeIcon.textContent = "🌙";
					themeIcon.style.transform = "rotate(0deg)";
				}
			}

			// Form validation functions
			function validateEmail(email) {
				const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
				return emailRegex.test(email);
			}

			function validatePhone(phone) {
				const phoneRegex = /^[\+]?[1-9][\d]{0,15}$/;
				return phoneRegex.test(phone.replace(/[\s\-\(\)]/g, ""));
			}

			function validatePassword(password) {
				// At least 8 characters, contains uppercase, lowercase, number, and special character
				const hasUppercase = /[A-Z]/.test(password);
				const hasLowercase = /[a-z]/.test(password);
				const hasNumber = /\d/.test(password);
				const hasSpecialChar = /[@$!%*?&]/.test(password);
				const isLongEnough = password.length >= 8;

				return (
					isLongEnough &&
					hasUppercase &&
					hasLowercase &&
					hasNumber &&
					hasSpecialChar
				);
			}

			function showError(inputElement, message) {
				removeError(inputElement);

				const errorDiv = document.createElement("div");
				errorDiv.className = "error-message";
				errorDiv.textContent = message;

				// Get current theme for styling
				const currentTheme = document.body.getAttribute("data-theme");
				const isDark = currentTheme === "dark";

				errorDiv.style.cssText = `
                color: ${isDark ? "#fca5a5" : "#dc2626"};
                font-size: 0.875rem;
                margin-top: 5px;
                padding: 10px 14px;
                background: ${
					isDark
						? "rgba(239, 68, 68, 0.15)"
						: "rgba(239, 68, 68, 0.2)"
				};
                border: 1px solid ${
					isDark ? "rgba(239, 68, 68, 0.3)" : "rgba(239, 68, 68, 0.4)"
				};
                border-radius: 12px;
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                animation: fadeIn 0.3s ease;
                font-weight: 500;
                box-shadow: 0 8px 32px rgba(239, 68, 68, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            `;

				inputElement.parentElement.appendChild(errorDiv);
				inputElement.style.borderColor = isDark ? "#f87171" : "#ef4444";
				inputElement.style.boxShadow = `0 0 0 3px ${
					isDark
						? "rgba(248, 113, 113, 0.15)"
						: "rgba(239, 68, 68, 0.15)"
				}`;
			}

			function removeError(inputElement) {
				const errorMessage =
					inputElement.parentElement.querySelector(".error-message");
				if (errorMessage) {
					errorMessage.remove();
				}
				inputElement.style.borderColor = "";
				inputElement.style.boxShadow = "";
			}

			function showSuccess(inputElement) {
				removeError(inputElement);
				inputElement.style.borderColor = "#10b981";

				// Remove success border after 2 seconds
				setTimeout(() => {
					inputElement.style.borderColor = "";
				}, 2000);
			}

			function showNotification(message, type = "success") {
				const notification = document.createElement("div");
				notification.className = "notification";
				notification.textContent = message;
				notification.style.cssText = `
                position: fixed;
                top: 80px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 12px;
                color: white;
                font-weight: 500;
                z-index: 10000;
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                animation: slideInRight 0.3s ease, fadeOut 0.3s ease 2.7s;
                ${
					type === "success"
						? "background: rgba(16, 185, 129, 0.9);"
						: "background: rgba(239, 68, 68, 0.9);"
				}
            `;

				document.body.appendChild(notification);

				setTimeout(() => {
					notification.remove();
				}, 3000);
			}

			// Real-time validation
			function setupRealTimeValidation() {
				const emailInput = document.getElementById("email");
				const contactInput = document.getElementById("contact");
				const passwordInput = document.getElementById("password");
				const confirmPasswordInput =
					document.getElementById("confirmPassword");

				// Email validation
				emailInput.addEventListener("blur", function () {
					const email = this.value.trim();
					if (email === "") {
						showError(this, "Email address is required");
					} else if (!validateEmail(email)) {
						showError(this, "Please enter a valid email address");
					} else {
						showSuccess(this);
					}
				});

				emailInput.addEventListener("input", function () {
					if (
						this.value.trim() !== "" &&
						validateEmail(this.value.trim())
					) {
						showSuccess(this);
					}
				});

				// Contact validation
				contactInput.addEventListener("blur", function () {
					const contact = this.value.trim();
					if (contact === "") {
						showError(this, "Contact number is required");
					} else if (!validatePhone(contact)) {
						showError(this, "Please enter a valid contact number");
					} else {
						showSuccess(this);
					}
				});

				contactInput.addEventListener("input", function () {
					if (
						this.value.trim() !== "" &&
						validatePhone(this.value.trim())
					) {
						showSuccess(this);
					}
				});

				// Password validation
				passwordInput.addEventListener("blur", function () {
					const password = this.value;
					if (password === "") {
						showError(this, "Password is required");
					} else if (password.length < 8) {
						showError(
							this,
							"Password must be at least 8 characters long"
						);
					} else if (!validatePassword(password)) {
						showError(
							this,
							"Password must contain: uppercase letter, lowercase letter, number, and special character (@$!%*?&)"
						);
					} else {
						showSuccess(this);
						// Revalidate confirm password if it has value
						if (confirmPasswordInput.value !== "") {
							validateConfirmPassword();
						}
					}
				});

				// Confirm password validation
				function validateConfirmPassword() {
					const password = passwordInput.value;
					const confirmPassword = confirmPasswordInput.value;

					if (confirmPassword === "") {
						showError(
							confirmPasswordInput,
							"Please confirm your password"
						);
					} else if (password !== confirmPassword) {
						showError(
							confirmPasswordInput,
							"Passwords do not match"
						);
					} else {
						showSuccess(confirmPasswordInput);
					}
				}

				confirmPasswordInput.addEventListener(
					"blur",
					validateConfirmPassword
				);
				confirmPasswordInput.addEventListener("input", function () {
					if (
						this.value !== "" &&
						passwordInput.value === this.value
					) {
						showSuccess(this);
					}
				});
			}

			// Form submission handler
			function handleFormSubmit(event) {
				event.preventDefault();

				const form = event.target;
				const formData = new FormData(form);
				const data = Object.fromEntries(formData.entries());

				let isValid = true;
				let emptyFields = 0;

				// Check for empty fields first
				const emailInput = document.getElementById("email");
				const contactInput = document.getElementById("contact");
				const passwordInput = document.getElementById("password");
				const confirmPasswordInput =
					document.getElementById("confirmPassword");

				if (!data.email || data.email.trim() === "") {
					showError(emailInput, "Email address is required");
					isValid = false;
					emptyFields++;
				} else if (!validateEmail(data.email)) {
					showError(emailInput, "Please enter a valid email address");
					isValid = false;
				}

				if (!data.contact || data.contact.trim() === "") {
					showError(contactInput, "Contact number is required");
					isValid = false;
					emptyFields++;
				} else if (!validatePhone(data.contact)) {
					showError(
						contactInput,
						"Please enter a valid contact number"
					);
					isValid = false;
				}

				if (!data.password || data.password === "") {
					showError(passwordInput, "Password is required");
					isValid = false;
					emptyFields++;
				} else if (data.password.length < 8) {
					showError(
						passwordInput,
						"Password must be at least 8 characters long"
					);
					isValid = false;
				} else if (!validatePassword(data.password)) {
					showError(
						passwordInput,
						"Password must contain: uppercase letter, lowercase letter, number, and special character (@$!%*?&)"
					);
					isValid = false;
				}

				if (!data.confirmPassword || data.confirmPassword === "") {
					showError(
						confirmPasswordInput,
						"Please confirm your password"
					);
					isValid = false;
					emptyFields++;
				} else if (data.password !== data.confirmPassword) {
					showError(confirmPasswordInput, "Passwords do not match");
					isValid = false;
				}

				if (!isValid) {
					if (emptyFields === 4) {
						showNotification(
							"Please fill in all required fields",
							"error"
						);
					} else if (emptyFields > 0) {
						showNotification(
							`Please fill in ${
								emptyFields === 1
									? "the missing field"
									: "all missing fields"
							}`,
							"error"
						);
					} else {
						showNotification(
							"Please fix the errors below",
							"error"
						);
					}
					return;
				}

				// Simulate form submission
				const submitBtn = form.querySelector(".submit-btn");
				const originalText = submitBtn.textContent;
				submitBtn.textContent = "Creating Account...";
				submitBtn.disabled = true;
				submitBtn.style.opacity = "0.7";

				setTimeout(() => {
					showNotification(
						"Account created successfully! Welcome aboard!",
						"success"
					);
					form.reset();

					// Remove all error/success states
					document.querySelectorAll("input").forEach((input) => {
						removeError(input);
						input.style.borderColor = "";
						input.style.boxShadow = "";
					});

					submitBtn.textContent = originalText;
					submitBtn.disabled = false;
					submitBtn.style.opacity = "1";
				}, 2000);
			}

			// Enhanced form interactions
			function setupFormInteractions() {
				document.querySelectorAll("input").forEach((input) => {
					input.addEventListener("focus", function () {
						this.parentElement.style.transform = "scale(1.02)";
						this.parentElement.style.transition =
							"transform 0.3s ease";
					});

					input.addEventListener("blur", function () {
						this.parentElement.style.transform = "scale(1)";
					});
				});
			}

			// Floating particles animation
			function animateParticles() {
				document
					.querySelectorAll(".particle")
					.forEach((particle, index) => {
						particle.style.animationDelay = `${index * 2}s`;

						// Random position and size variations
						const randomTop = Math.random() * 80 + 10;
						const randomLeft = Math.random() * 80 + 10;
						const randomSize = Math.random() * 40 + 40;

						particle.style.top = `${randomTop}%`;
						particle.style.left = `${randomLeft}%`;
						particle.style.width = `${randomSize}px`;
						particle.style.height = `${randomSize}px`;
					});
			}

			// Initialize everything when DOM is loaded
			document.addEventListener("DOMContentLoaded", function () {
				// Load saved theme
				loadSavedTheme();

				// Setup form validation
				setupRealTimeValidation();

				// Setup form interactions
				setupFormInteractions();

				// Animate particles
				animateParticles();

				// Add form submit handler
				document
					.querySelector("form")
					.addEventListener("submit", handleFormSubmit);

				// Add CSS animations
				const style = document.createElement("style");
				style.textContent = `
                @keyframes fadeIn {
                    from { opacity: 0; transform: translateY(-10px); }
                    to { opacity: 1; transform: translateY(0); }
                }
                
                @keyframes slideInRight {
                    from { opacity: 0; transform: translateX(100px); }
                    to { opacity: 1; transform: translateX(0); }
                }
                
                @keyframes fadeOut {
                    from { opacity: 1; }
                    to { opacity: 0; }
                }
            `;
				document.head.appendChild(style);
			});
		</script>
	</body>
